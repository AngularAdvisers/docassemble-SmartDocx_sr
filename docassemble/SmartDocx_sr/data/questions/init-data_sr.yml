mandatory: True
code: |
  multi_user = True
---
# Inject a tiny JS helper on every screen so per-interview final
# questions just need a <button onclick="smartDocxSaveAndExit(this)">.
default screen parts:
  post: |
    <script>
      function smartDocxSaveAndExit(btn) {
        if (btn) {
          btn.disabled = true;
          btn.innerText = 'Чување...';
        }
        if (window.parent && window.parent !== window) {
          // Read the current session id from the iframe's URL — see
          // init-data_en.yml for the full rationale. DA can mint a new
          // session mid-flight, and the parent must use *that* id for the
          // attach mutation, not whatever it cached at iframe-open time.
          var sessionId = new URLSearchParams(window.location.search).get('session') || '';
          window.parent.postMessage(
            { type: 'docassemble:complete', sessionId: sessionId },
            '*'
          );
        }
      }
    </script>
