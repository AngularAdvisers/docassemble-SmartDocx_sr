
---

include:
  - init-data_sr.yml

---

features:
  css: docassemble.SmartDocx_sr:data/static/sd_sr.css

---

metadata:
  title: |
    одштетни захтев за возило
  short title: |
    одштетни захтев за возило
  description: |
    одштетни захтев за возило

---

objects:
  - client: Individual
  - lawyer: Individual
  - defendant: Individual
  - court: Organisation

---

mandatory: True
code: |
  multi_user = True

---

code: |
  court_name = ''
  client_name_first = ''
  client_name_last = ''
  start_data = None
  client.name.first = ''
  client.name.last = ''
  client.address = ''
  client.jmbg = ''
  
  lawyer.name.first = ''
  lawyer.name.last = ''
  lawyer.address = ''
  
  defendant.name.first = ''
  defendant.name.last = ''
  defendant.address = ''
  defendant.jmbg = ''
  
  custody_party = ''

---

mandatory: True
question: |
  Подаци о возилу и штети
subquestion: |
  Унесите податке о возилу, удесу и оштеценом. Сва поља су опциона —
  оставите празна она која ћете попунити касније у документу.
fields:
  - Регистарски број возила: sd_vehicle_plate
    required: False
  - Маркa и модел возила: sd_vehicle_make_model
    required: False
  - VIN број шасије: sd_vehicle_vin
    required: False
  - Број полисе осигурања: sd_policy_number
    required: False
  - Датум удеса: sd_accident_date
    required: False
  - Локација удеса: sd_accident_location
    required: False
  - Околности удеса: sd_accident_circumstances
    required: False
    input type: area
  - Износ штете (RSD): sd_damage_amount
    required: False
  - Прималац штете — име и презиме: sd_recipient_full_name
    required: False
  - Прималац штете — адреса: sd_recipient_address
    required: False

---

mandatory: True
question: Ovde je vaš dokument.
subquestion: |
  Можете преузети документ испод или послати копију на е-пошту.
  Када завршите преглед, кликните на **Сачувај и изађи** да приложите
  документ уз предмет и вратите се у Smart-Docx.

  <!--
    Layout (matches the screenshot the team approved):
      1. A small "Преузми" tab label sitting on the page surface (no
         filled white/gray background, no boxed header band).
      2. A list of file links (DOCX + PDF) underneath as plain
         hyperlinks with their icons.
      3. The PDF preview iframe directly below, browser-native
         multi-page viewer.
  -->

  <div style="display: inline-block; padding: 0.35rem 0.85rem;
              border: 1px solid rgba(127,127,127,0.35);
              border-bottom: 0; border-radius: 6px 6px 0 0;
              font-size: 0.8rem; font-weight: 600;
              letter-spacing: 0.04em; text-transform: uppercase;
              opacity: 0.8;">
    Преузми
  </div>

  <div style="border-top: 1px solid rgba(127,127,127,0.35);
              padding: 0.75rem 0; margin-bottom: 1rem;">
    <p style="margin: 0 0 0.4rem 0;">
      <a href="${ doc_file.docx.url_for(attachment=True) }">
        <i class="fas fa-file-word"></i> DOCX
      </a>
    </p>
    <p style="margin: 0;">
      <a href="${ doc_file.pdf.url_for(attachment=True) }">
        <i class="fas fa-file-pdf"></i> PDF
      </a>
    </p>
  </div>

  <div style="border: 1px solid rgba(127,127,127,0.35); border-radius: 6px;
              overflow: hidden; height: 70vh; background: #fafafa;">
    <iframe
      src="${ doc_file.pdf.url_for() }#toolbar=1&navpanes=0&view=FitH"
      width="100%"
      height="100%"
      style="border: 0; display: block;"
      title="Преглед документа">
    </iframe>
  </div>

  <div class="text-center" style="margin-top: 1.5rem;">
    <button type="button" class="btn btn-primary btn-lg"
            onclick="smartDocxSaveAndExit(this)">
      Сачувај и изађи
    </button>
  </div>
# `smartDocxSaveAndExit` is defined globally in init-data_sr.yml — see
# the _en legal-services-agreement interview for the full rationale.
---

attachment:
  - name: Summary of Benefits
    # filename: benefits_summary
    variable name: doc_file
    docx template file: damage-claim-for-vehicle_sr.docx
    valid formats:
      - docx
      - pdf
