
---

include:
  - init-data_sr.yml

---

features:
  css: docassemble.SmartDocx_sr:data/static/sd_sr.css

---

metadata:
  title: |
    Corporate - Reject
  short title: |
    Corporate - Reject
  description: |
    No description

---

objects:
  - client: Individual
  - lawyer: Individual
  - defendant: Individual
  - court: Organisation

---

mandatory: True
code: |
  multi_user = True
  set_language('sr')

---

code: |
  court_name = ''
  client_name_first = ''
  start_data = None
  client.name.first = 'Bill'
  client.name.last = 'Best'
  client.address = '123 Main Street, Cacak'
  client.jmbg = '12345'
  
  lawyer.name.first = 'Bill'
  lawyer.name.last = 'Best'
  lawyer.address = '123 Secondary Street, Belgrade'
  
  defendant.name.first = 'Eva'
  defendant.name.last = 'Smith'
  defendant.address = '5th Ave, NY'
  defendant.jmbg = '54321'
  
  custody_party = 'Bane Nicovic'

---

mandatory: True
question: |
  Компанија информација
fields:
  - Датум ликвидације: case_date
    datatype: date
  - Име компаније: company_name
    datatype: text
  - Матични број: company_number
    datatype: text

---

mandatory: True
code: |
  client.name.first = sd_client_first_name
  client.name.last = sd_client_last_name
  custody_party = 'Bane Nicovic'

---

question: Ovde je vaš dokument.
attachments:
  - name: Ostavka
    filename: ostavka
    docx template file: statement-of-liquidation-manager_sr.docx
    variable name: doc_file
    valid formats:
      - docx
mandatory: True
# Notify Smart-Docx that the interview finished. The attachment block
# above has already materialised `doc_file` in the session, so the
# Smart-Docx backend can now fetch the assembled DOCX and attach it
# to the matter via the attachGeneratedDocument mutation.
script: |
  <script>
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'docassemble:complete' }, '*');
    }
  </script>
