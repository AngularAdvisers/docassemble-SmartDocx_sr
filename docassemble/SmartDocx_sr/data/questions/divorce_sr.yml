
---

include:
  - init-data_sr.yml

---

features:
  css: docassemble.SmartDocx_sr:data/static/sd_sr.css

---

metadata:
  title: |
    Complex Template
  short title: |
    Complex Template - Test
  description: |
    No description

---

objects:
  - client: Individual
  - lawyer: Individual
  - defendant: Individual
  - court: Organisation

---

initial: True
code: |
  set_language('sr')

---

mandatory: True
code: |
  multi_user = True

---

# `mandatory: True` is REQUIRED on this block. Docassemble's variable
# resolver only consults a non-mandatory `code:` block when searching for
# a specific variable that block defines — and its scanner can miss the
# atom assignments below the attribute assignments (`client.address = …`)
# in this same block, leading to runtime errors like
#   "There was a reference to a variable 'client_address' that could not
#    be looked up …"
# Marking the block mandatory forces Docassemble to evaluate it at the
# start of every interview run, so every fallback (`client_address = ''`
# etc.) is always defined before the mandatory copy-block below
# (`client.address = client_address`) executes.
mandatory: True
code: |
  court_name = ''
  client_name_first = ''
  client_name_last = ''
  start_data = None
  client.name.first = 'Bill'
  client.name.last = 'Best'
  client.address = '123 Main Street, Cacak'
  client.jmbg = '12345'

  lawyer.name.first = 'Bill'
  lawyer.name.last = 'Best'
  lawyer.address = '123 Secondary Street, Belgrade'

  defendant.name.first = 'Eva'
  defendant.name.last = 'Smith'
  defendant.address = '5th Ave, NY'
  defendant.jmbg = '54321'

  custody_party = 'Bane Nicovic'

  # Intermediate variables consumed by the mandatory `client.address = client_address`
  # / `lawyer.address = lawyer_address` / etc. block lower in this file.
  # Smart-Docx passes these values as URL parameters when launching the
  # interview; when the interview is opened standalone (testing, dev) the
  # parameters are absent. Initialising to empty strings keeps the
  # mandatory copy-block from raising "variable not defined" and the
  # downstream DOCX template from blowing up when it Jinja-substitutes
  # the corresponding object attributes.
  client_address = ''
  client_jmbg = ''
  lawyer_name_first = ''
  lawyer_name_last = ''
  lawyer_address = ''
  defendant_name_first = ''
  defendant_name_last = ''
  defendant_address = ''
  defendant_jmbg = ''
  matter_id = ''
  work_item_id = ''
  filename = ''

---

mandatory: True
question: |
  У ком граду се води ваш случај?
fields: 
  - Град: county
    choices:
      - Београд
      - Нови Сад

---

mandatory: True
question: |
  На ком суду се води ваш случај?
fields: 
  - Име суда: court
    choices:
      - Први основни суд у Београду
      - Други основни суд у Београду
      - Трећи основни суд у Београду
      - Основни суд у Новом Саду
      - Основни суд у Бачкој Паланци

---

mandatory: True
question: |
  ${ court }
# ОСНОВНОМ СУДУ У СУД 
# To ${ court_name } ${ start_data }
fields:
  - note: ТУЖБА
  - "ради развода брака": opt_divorce
    datatype: yesnowide
  - "вршења родитељског права": opt_parent
    datatype: yesnowide
  - "доприноса издржавања": opt_doprinosa
    datatype: yesnowide
  - "са привременом мером ": opt_merom
    datatype: yesnowide
  - Датум потписивања: case_date
    datatype: date
  - "Колико малолетне деце": child_amount
    datatype: integer
  - "Имена деце": child_names
  - "Број ЈМБГ": child_jmbg
  - html: |
      <hr>
    show if:
      variable: opt_divorce
      is: True
  - "Датум венчања": date_marriage
    datatype: date
    show if:
      variable: opt_divorce
      is: True
  - "Место венчања": place_marriage
    show if:
      variable: opt_divorce
      is: True
  - "Серијски број венчања": cert_marriage
    show if:
      variable: opt_divorce
      is: True
  - "када је брак почео, до када је трајала заједница, и (опционо) због чега је дошло до развода брака": lawsuit_marriage
    show if:
      variable: opt_divorce
      is: True
    input type: area
  - html: |
      <hr>
    show if:
      variable: opt_parent
      is: True
  - "Са ким се деца тренутно налазе? Коме доделити вршење родитељског права? Да ли постоји неформални модел виђања са другим родитељем? Интерес детета? Какво је стање након престанка заједнице? Посебне напомене.": lawsuit_child
    show if:
      variable: opt_parent
      is: True
    input type: area
  - "Докази који се предлажу у поступку?": lawsuit_child2
    input type: area
    show if:
      variable: opt_parent
      is: True
  - "Предложени модел виђања детета са родитељем с којим не живи.": lawsuit_child3
    input type: area
    show if:
      variable: opt_parent
      is: True
  - html: |
      <hr>
    show if:
      variable: opt_doprinosa
      is: True
  - "Предложени износ на име доприноса обавезног издржавања. Кратко образложити месечне трошкове детета/деце.": lawsuit_doprinosa
    input type: area
    show if:
      variable: opt_doprinosa
      is: True
  - "Докази који се предлажу у поступку?": lawsuit_doprinosa2
    input type: area
    show if:
      variable: opt_doprinosa
      is: True
  - html: |
      <hr>
    show if:
      variable: opt_merom
      is: True
  - "Чињенично стање због ког је оправдано тражити привремену меру.": lawsuit_merom
    input type: area
    show if:
      variable: opt_merom
      is: True
  - "Custody Amount": amount_merom
    show if:
      variable: opt_merom
      is: True
  - "Дете/свако дете": dete_merom
    input type: dropdown
    choices: 
      - дете
      - свако дете
    show if:
      variable: opt_merom
      is: True

---

mandatory: True
code: |
  client.name.first = client_name_first
  client.name.last = client_name_last
  client.address = client_address
  client.jmbg = client_jmbg
  
  lawyer.name.first = lawyer_name_first
  lawyer.name.last = lawyer_name_last
  lawyer.address = lawyer_address
  
  defendant.name.first = defendant_name_first
  defendant.name.last = defendant_name_last
  defendant.address = defendant_address
  defendant.jmbg = defendant_jmbg
  
  matterId = matter_id
  workItemId = work_item_id
  fileName = filename
  
  custody_party = ''

---

mandatory: True
question: Ovde je vaš dokument.
subquestion: |
  Можете преузети документ испод или послати копију на е-пошту.
  Када завршите преглед, кликните на **Сачувај и изађи** да приложите
  документ уз предмет и вратите се у Smart-Docx.

  <!--
    Layout (matches the screenshot the team approved):
      1. A small "Преузми" tab label sitting on the page surface (no
         filled white/gray background, no boxed header band).
      2. A list of file links (DOCX + PDF) underneath as plain
         hyperlinks with their icons.
      3. The PDF preview iframe directly below, browser-native
         multi-page viewer.
  -->

  <div style="display: inline-block; padding: 0.35rem 0.85rem;
              border: 1px solid rgba(127,127,127,0.35);
              border-bottom: 0; border-radius: 6px 6px 0 0;
              font-size: 0.8rem; font-weight: 600;
              letter-spacing: 0.04em; text-transform: uppercase;
              opacity: 0.8;">
    Преузми
  </div>

  <div style="border-top: 1px solid rgba(127,127,127,0.35);
              padding: 0.75rem 0; margin-bottom: 1rem;">
    <p style="margin: 0 0 0.4rem 0;">
      <a href="${ doc_file.docx.url_for(attachment=True) }">
        <i class="fas fa-file-word"></i> DOCX
      </a>
    </p>
    <p style="margin: 0;">
      <a href="${ doc_file.pdf.url_for(attachment=True) }">
        <i class="fas fa-file-pdf"></i> PDF
      </a>
    </p>
  </div>

  <div style="border: 1px solid rgba(127,127,127,0.35); border-radius: 6px;
              overflow: hidden; height: 70vh; background: #fafafa;">
    <iframe
      src="${ doc_file.pdf.url_for() }#toolbar=1&navpanes=0&view=FitH"
      width="100%"
      height="100%"
      style="border: 0; display: block;"
      title="Преглед документа">
    </iframe>
  </div>

  <div class="text-center" style="margin-top: 1.5rem;">
    <button type="button" class="btn btn-primary btn-lg"
            onclick="smartDocxSaveAndExit(this)">
      Сачувај и изађи
    </button>
  </div>
# `smartDocxSaveAndExit` is defined globally in init-data_sr.yml — see
# the _en legal-services-agreement interview for the full rationale.
---

attachment:
  - name: Развод
    file: divorce_file
    variable name: doc_file
    docx template file: divorce_sr.docx
    valid formats:
      - docx
      - pdf
