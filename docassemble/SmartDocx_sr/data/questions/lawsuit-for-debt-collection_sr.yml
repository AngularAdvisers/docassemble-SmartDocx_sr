mandatory: True
progress: 100
section: Завршено
question: |
  Ovde je vaš dokument.
subquestion: |
  Можете преузети документ испод или послати копију на е-пошту.
  Када завршите преглед, кликните на **Сачувај и изађи** да приложите
  документ уз предмет и вратите се у Smart-Docx.

  <!--
    Layout (matches the screenshot the team approved):
      1. A small "Преузми" tab label sitting on the page surface (no
         filled white/gray background, no boxed header band).
      2. A list of file links (DOCX + PDF) underneath as plain
         hyperlinks with their icons.
      3. The PDF preview iframe directly below, browser-native
         multi-page viewer.
  -->

  <div style="display: inline-block; padding: 0.35rem 0.85rem;
              border: 1px solid rgba(127,127,127,0.35);
              border-bottom: 0; border-radius: 6px 6px 0 0;
              font-size: 0.8rem; font-weight: 600;
              letter-spacing: 0.04em; text-transform: uppercase;
              opacity: 0.8;">
    Преузми
  </div>

  <div style="border-top: 1px solid rgba(127,127,127,0.35);
              padding: 0.75rem 0; margin-bottom: 1rem;">
    <p style="margin: 0 0 0.4rem 0;">
      <a href="${ doc_file.docx.url_for(attachment=True) }">
        <i class="fas fa-file-word"></i> DOCX
      </a>
    </p>
    <p style="margin: 0;">
      <a href="${ doc_file.pdf.url_for(attachment=True) }">
        <i class="fas fa-file-pdf"></i> PDF
      </a>
    </p>
  </div>

  <div style="border: 1px solid rgba(127,127,127,0.35); border-radius: 6px;
              overflow: hidden; height: 70vh; background: #fafafa;">
    <iframe
      src="${ doc_file.pdf.url_for() }#toolbar=1&navpanes=0&view=FitH"
      width="100%"
      height="100%"
      style="border: 0; display: block;"
      title="Преглед документа">
    </iframe>
  </div>

  <div class="text-center" style="margin-top: 1.5rem;">
    <button type="button" class="btn btn-primary btn-lg"
            onclick="smartDocxSaveAndExit(this)">
      Сачувај и изађи
    </button>
  </div>
# `smartDocxSaveAndExit` is defined globally in init-data_sr.yml — see
# the _en legal-services-agreement interview for the full rationale.
attachment:
  - name: Тужба за наплату дуга
    filename: lawsuit-for-debt-collection
    docx template file: lawsuit-for-debt-collection_sr.docx
    variable name: doc_file
    valid formats:
      - docx
      - pdf
