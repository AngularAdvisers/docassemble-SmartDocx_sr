
---

metadata:
  title: |
    Legal Services Agreenment Document
  short title: |
    Services Agreement
  description: |
    This the legal services agreement document
  authors:
    - name: William Best
      organization: Andjelkovic Law Firm
    - name: Nemanja Anđelković
      organization: Andjelkovic Law Firm
  revision_date: 2024-04-08

---

include:
  - init-data_sr.yml

---

features:
  css: docassemble.SmartDocx_sr:data/static/sd_sr.css
  navigation: True
  progress bar: True  

---

sections:
  - Име клијента
  - Адреса клијента
  - Име адвоката
  - Адреса адвоката
  - Износ таксе
  - Датум потписивања
  - Потпис
  - Завршено

---

objects:
  - lsa_client_individual: Individual
  - lsa_client_address: Address
  - lsa_lawyer_individual: Individual
  - lsa_lawyer_address: Address

---

initial: True
code: |
  set_language('sr')
  multi_user = True

---

mandatory: True
progress: 1
section: Име клијента
question: |
  Како се зове клијент?
fields:
  - Име: lsa_client_individual.name.first
    default: |
      ${ sd_client_first_name }  
  - Средње име: lsa_client_individual.name.middle
    required: False
  - Презиме: lsa_client_individual.name.last
    default: |
      ${ sd_client_last_name }    
  - Презиме: lsa_client_individual.name.suffix
    required: False
    code: name_suffix()

---

mandatory: True
progress: 15
section: Адреса клијента
question: |
  Која је адреса вашег клијента?
fields:
  - Адреса: lsa_client_address.address
    default: |
      ${ sd_client_street }   
  - Број: lsa_client_address.unit
    required: False
  - Град: lsa_client_address.city
    default: |
      ${ sd_client_city }    
  - Држава: lsa_client_address.state
    required: False
  - Поштански број: lsa_client_address.postal_code
    default: |
      ${ sd_client_zip }    
    required: False
  - Држава: lsa_client_address.country
    code: |
      countries_list()
    required: False

---

mandatory: True
progress: 30
section: Име адвоката
question: |
  Како се зове адвокат?
fields:
  - Име: lsa_lawyer_individual.name.first
    default: |
      ${ sd_lawyer_first_name }    
  - Средње име: lsa_lawyer_individual.name.middle
    required: False
  - Презиме: lsa_lawyer_individual.name.last
    default: |
      ${ sd_lawyer_last_name }    
  - Презиме: lsa_lawyer_individual.name.suffix
    required: False
    code: name_suffix()

---

mandatory: True
progress: 45
section: Адреса адвоката
question: |
  Која је адреса вашег адвоката?
fields:
  - Адреса: lsa_lawyer_address.address
    default: |
      ${ sd_lawyer_street }    
  - Број: lsa_lawyer_address.unit
    required: False
  - Град: lsa_lawyer_address.city
    default: |
      ${ sd_lawyer_city }    
  - Држава: lsa_lawyer_address.state
    required: False
  - Поштански број: lsa_lawyer_address.postal_code
    default: |
      ${ sd_lawyer_zip }    
    required: False
  - Држава: lsa_lawyer_address.country
    code: |
      countries_list()
    required: False

---

mandatory: True
progress: 60
section: Износ таксе
question: |
  Колики је износ накнаде за уговор о правним услугама?
fields:
  - Value: lsa_fee
    datatype: currency
    min: 0
    currency symbol: €    
under: |
   Клијент: ${ lsa_client_individual }
   Клијент Адреса: ${ lsa_client_address }
   Адвокат: ${ lsa_lawyer_individual }
   Адвокат Адреса: ${ lsa_lawyer_address }

---

code: |
  lsa_fee_amount = "{:.2f}".format(lsa_fee)

---

mandatory: True
progress: 75
section: Датум потписивања
question: |
  Ког датума је клијент потписао уговор?
fields:
  - Date: lsa_date_signed
    datatype: date

---

mandatory: True
question: Молимо потпишите се испод
progress: 90
section: Потпис
subquestion: |
  BПотписивањем у наставку потврђујете да су
  ваши одговори на питања у овом интервјуу 
  били истинити, према вашем најбољем сазнању 
  и да сте сагласни са условима споразума.
signature: lsa_client_signature
under: |
  Клијент: ${ lsa_client_individual }<br>
  Клијент Адреса: ${ lsa_client_address }<br>
  Адвокат: ${ lsa_lawyer_individual }<br>
  Адвокат Адреса: ${ lsa_lawyer_address }<br>
  Надокнада Износ: ${ lsa_fee_amount } <br>
  Датум Потписан: ${ lsa_date_signed }  

---

mandatory: True
progress: 100
section: Завршено
question: |
  Ovde je vaš dokument.
subquestion: |
  You can download the document below, or email a copy to yourself.
  When you're finished reviewing, click **Save and Exit** to attach the
  document to the matter and return to Smart-Docx.

  <!--
    Layout (matches the screenshot the team approved):
      1. A small "Преузми" tab label sitting on the page surface (no
         filled white/gray background, no boxed header band).
      2. A list of file links (DOCX + PDF) underneath as plain
         hyperlinks with their icons.
      3. The PDF preview iframe directly below, browser-native
         multi-page viewer.
  -->

  <div style="display: inline-block; padding: 0.35rem 0.85rem;
              border: 1px solid rgba(127,127,127,0.35);
              border-bottom: 0; border-radius: 6px 6px 0 0;
              font-size: 0.8rem; font-weight: 600;
              letter-spacing: 0.04em; text-transform: uppercase;
              opacity: 0.8;">
    Преузми
  </div>

  <div style="border-top: 1px solid rgba(127,127,127,0.35);
              padding: 0.75rem 0; margin-bottom: 1rem;">
    <p style="margin: 0 0 0.4rem 0;">
      <a href="${ doc_file.docx.url_for(attachment=True) }">
        <i class="fas fa-file-word"></i> DOCX
      </a>
    </p>
    <p style="margin: 0;">
      <a href="${ doc_file.pdf.url_for(attachment=True) }">
        <i class="fas fa-file-pdf"></i> PDF
      </a>
    </p>
  </div>

  <div style="border: 1px solid rgba(127,127,127,0.35); border-radius: 6px;
              overflow: hidden; height: 70vh; background: #fafafa;">
    <iframe
      src="${ doc_file.pdf.url_for() }#toolbar=1&navpanes=0&view=FitH"
      width="100%"
      height="100%"
      style="border: 0; display: block;"
      title="Преглед документа">
    </iframe>
  </div>

  <div class="text-center" style="margin-top: 1.5rem;">
    <button type="button" class="btn btn-primary btn-lg"
            onclick="smartDocxSaveAndExit(this)">
      Save and Exit
    </button>
  </div>
# `smartDocxSaveAndExit` is defined globally in init-data_sr.yml — see
# the _en legal-services-agreement interview for the full rationale.
---

attachment:
  - name: Правни Услуге Договор Документ
    filename: leagal_services_agreenment_document
    docx template file: legal-services-agreement_en-sr.docx
    variable name: doc_file
    valid formats:
      - docx
      - pdf
